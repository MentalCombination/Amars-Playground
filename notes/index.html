<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Notes</title>
<!-- Shell bar pushes content down (no data-float) -->
<script src="../shell.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --border: rgba(255,255,255,0.08);
    --text: #f0f0f5;
    --text-muted: rgba(240,240,245,0.4);
    --accent: #e9c46a;
  }

  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f2f2f7; --surface: #fff;
      --border: rgba(0,0,0,0.08);
      --text: #0a0a0f; --text-muted: rgba(10,10,15,0.4);
    }
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--bg);
    font-family: 'DM Sans', -apple-system, sans-serif;
    color: var(--text);
  }

  #page {
    height: 100%;
    display: flex;
    flex-direction: column;
  }

  textarea {
    flex: 1;
    width: 100%;
    padding: 20px 24px calc(env(safe-area-inset-bottom, 0px) + 20px);
    background: var(--bg);
    border: none;
    outline: none;
    resize: none;
    font-family: 'DM Mono', ui-monospace, monospace;
    font-size: 15px;
    color: var(--text);
    line-height: 1.7;
    -webkit-overflow-scrolling: touch;
  }

  textarea::placeholder { color: var(--text-muted); }
</style>
</head>
<body>
<div id="page">
  <textarea placeholder="Start typing…" spellcheck="true"></textarea>
</div>
</body>
</html>
