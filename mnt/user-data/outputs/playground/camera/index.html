<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Camera</title>
<!-- Shell bar floats over full-bleed camera view -->
<script src="../shell.js" data-float></script>
<style>
  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0; padding: 0;
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
    user-select: none;
    -webkit-user-select: none;
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    overscroll-behavior: none;
    touch-action: none;
    background: #000;
  }

  #app {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #000;
  }

  #viewfinder {
    position: absolute;
    inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    background: #111;
    display: block;
  }

  #viewfinder.mirrored { transform: scaleX(-1); }

  #frozen-frame {
    position: absolute;
    inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    display: none;
  }

  #frozen-frame.visible { display: block; }

  #frozen-badge {
    position: absolute;
    top: calc(env(safe-area-inset-top, 0px) + 64px);
    left: 50%;
    transform: translateX(-50%);
    background: rgba(220,50,50,0.85);
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 6px 16px;
    border-radius: 20px;
    display: none;
    pointer-events: none;
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    z-index: 20;
  }

  #frozen-badge.visible { display: block; }

  #controls {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 24px 32px max(28px, env(safe-area-inset-bottom, 28px));
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    z-index: 10;
    background: linear-gradient(to top, rgba(0,0,0,0.55) 0%, transparent 100%);
  }

  .btn-circle {
    flex-shrink: 0;
    width: 52px; height: 52px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.6);
    background: rgba(255,255,255,0.12);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    outline: none;
  }

  .btn-circle:active { transform: scale(0.92); background: rgba(255,255,255,0.25); }
  .btn-circle.active { border-color: #fff; background: rgba(255,255,255,0.28); }

  #btn-freeze {
    width: 72px; height: 72px;
    border: 3px solid #fff;
    background: rgba(255,255,255,0.15);
    position: relative;
  }

  #btn-freeze .shutter-inner {
    width: 56px; height: 56px;
    border-radius: 50%;
    background: #fff;
    transition: background 0.15s, transform 0.1s, border-radius 0.15s;
  }

  #btn-freeze.frozen .shutter-inner {
    background: #e83c3c;
    transform: scale(0.72);
    border-radius: 10px;
  }

  #btn-freeze:active .shutter-inner { transform: scale(0.88); }
  #btn-freeze.frozen:active .shutter-inner { transform: scale(0.64); }

  #error-msg {
    position: absolute; inset: 0;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 16px;
    text-align: center;
    padding: 32px;
    z-index: 30;
    background: #000;
  }

  #error-msg.visible { display: flex; }
  #error-msg svg { opacity: 0.5; }
  #error-msg p { opacity: 0.7; font-size: 14px; max-width: 260px; line-height: 1.5; }

  #canvas-capture { display: none; }
</style>
</head>
<body>
<div id="app">
  <video id="viewfinder" autoplay playsinline muted></video>
  <img id="frozen-frame" alt="Frozen frame">
  <canvas id="canvas-capture"></canvas>
  <div id="frozen-badge">Frozen</div>

  <div id="controls">
    <button class="btn-circle" id="btn-mirror" aria-label="Toggle mirror">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 3v18"/><path d="M4 7l4 5-4 5"/><path d="M20 7l-4 5 4 5"/>
      </svg>
    </button>

    <button class="btn-circle" id="btn-freeze" aria-label="Freeze frame">
      <div class="shutter-inner"></div>
    </button>

    <button class="btn-circle" id="btn-flip" aria-label="Flip camera">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 7h-9"/><path d="M14 17H5"/>
        <polyline points="17 4 20 7 17 10"/><polyline points="8 14 5 17 8 20"/>
      </svg>
    </button>
  </div>

  <div id="error-msg">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"/>
      <line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/>
    </svg>
    <strong>Camera unavailable</strong>
    <p id="error-detail">Please allow camera access and reload the page.</p>
  </div>
</div>

<script>
  const video = document.getElementById('viewfinder');
  const frozenFrame = document.getElementById('frozen-frame');
  const frozenBadge = document.getElementById('frozen-badge');
  const canvas = document.getElementById('canvas-capture');
  const btnFreeze = document.getElementById('btn-freeze');
  const btnMirror = document.getElementById('btn-mirror');
  const btnFlip = document.getElementById('btn-flip');
  const errorMsg = document.getElementById('error-msg');
  const errorDetail = document.getElementById('error-detail');

  let stream = null;
  let isFrozen = false;
  let isMirrored = true;
  let facingMode = 'user';

  async function startCamera() {
    if (stream) stream.getTracks().forEach(t => t.stop());
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode, width: { ideal: 1920 }, height: { ideal: 1080 } },
        audio: false
      });
      video.srcObject = stream;
      errorMsg.classList.remove('visible');
    } catch (err) {
      errorDetail.textContent = err.message || 'Camera access denied or unavailable.';
      errorMsg.classList.add('visible');
    }
  }

  function applyMirror() {
    video.classList.toggle('mirrored', isMirrored);
  }

  function freezeFrame() {
    const w = video.videoWidth || 640;
    const h = video.videoHeight || 480;
    canvas.width = w; canvas.height = h;
    const ctx = canvas.getContext('2d');
    if (isMirrored) { ctx.translate(w, 0); ctx.scale(-1, 1); }
    ctx.drawImage(video, 0, 0, w, h);
    frozenFrame.src = canvas.toDataURL('image/jpeg', 0.95);
    frozenFrame.classList.add('visible');
    frozenBadge.classList.add('visible');
    btnFreeze.classList.add('frozen');
    isFrozen = true;
    video.style.display = 'none';
  }

  function unfreezeFrame() {
    frozenFrame.classList.remove('visible');
    frozenBadge.classList.remove('visible');
    btnFreeze.classList.remove('frozen');
    isFrozen = false;
    video.style.display = '';
    frozenFrame.src = '';
  }

  btnFreeze.addEventListener('click', () => isFrozen ? unfreezeFrame() : freezeFrame());

  btnMirror.addEventListener('click', () => {
    isMirrored = !isMirrored;
    applyMirror();
    btnMirror.classList.toggle('active', isMirrored);
    if (isFrozen) { unfreezeFrame(); freezeFrame(); }
  });

  btnFlip.addEventListener('click', () => {
    if (isFrozen) unfreezeFrame();
    facingMode = facingMode === 'user' ? 'environment' : 'user';
    isMirrored = facingMode === 'user';
    applyMirror();
    btnMirror.classList.toggle('active', isMirrored);
    startCamera();
  });

  document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });
  document.addEventListener('gesturestart', e => e.preventDefault());
  document.addEventListener('gesturechange', e => e.preventDefault());
  document.addEventListener('gestureend', e => e.preventDefault());

  isMirrored = true;
  btnMirror.classList.add('active');
  applyMirror();
  startCamera();
</script>
</body>
</html>
