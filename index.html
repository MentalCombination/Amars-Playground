<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#09090e">
<title>Amar's Playground</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="manifest" href="/Amars-Playground/manifest.json">
<style>
  *, *::before, *::after {
    box-sizing: border-box; margin: 0; padding: 0;
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
    user-select: none; -webkit-user-select: none;
  }

  :root {
    --bg:          #09090e;
    --bg2:         #0f0f16;
    --surface:     #141420;
    --surface2:    #1b1b2a;
    --surface3:    #22223a;
    --border:      rgba(255,255,255,0.06);
    --border-md:   rgba(255,255,255,0.10);
    --border-hi:   rgba(255,255,255,0.16);
    --text:        #eeeef5;
    --text-sub:    rgba(238,238,245,0.55);
    --text-dim:    rgba(238,238,245,0.28);
    --accent:      #6c5ce7;
    --accent-soft: rgba(108,92,231,0.15);
    --font:        'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    --mono:        'DM Mono', ui-monospace, monospace;
    --r-tile:      22px;
    --r-icon:      16px;
    --safe-top:    env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    overscroll-behavior: none;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    -webkit-font-smoothing: antialiased;
  }

  /* Subtle noise grain */
  body::after {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
    background-size: 200px 200px;
    pointer-events: none;
    z-index: 9998;
    opacity: 0.6;
  }

  #app {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
  }

  /* ── Header ── */
  header {
    flex-shrink: 0;
    padding: calc(var(--safe-top) + 24px) 24px 0;
    display: flex; flex-direction: column; gap: 2px;
  }

  .header-eyebrow {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.16em;
    color: var(--text-dim);
    text-transform: uppercase;
  }

  h1 {
    font-size: 30px;
    font-weight: 300;
    letter-spacing: -0.03em;
    line-height: 1.1;
    color: var(--text);
  }

  h1 em {
    font-style: normal;
    font-weight: 500;
    background: linear-gradient(135deg, #a78bfa 0%, #6c5ce7 60%, #4f46e5 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* ── Search ── */
  .search-wrap {
    flex-shrink: 0;
    padding: 18px 20px 0;
  }

  .search-box {
    display: flex; align-items: center; gap: 10px;
    background: var(--surface);
    border: 1px solid var(--border-md);
    border-radius: 14px;
    padding: 0 14px; height: 44px;
    transition: border-color 0.2s, background 0.2s;
  }

  .search-box:focus-within {
    border-color: var(--border-hi);
    background: var(--surface2);
  }

  .search-icon { color: var(--text-dim); flex-shrink: 0; display: flex; }

  #search {
    flex: 1; background: none; border: none; outline: none;
    font-family: var(--font); font-size: 15px; color: var(--text);
    caret-color: var(--accent);
    user-select: text; -webkit-user-select: text;
  }

  #search::placeholder { color: var(--text-dim); }

  #search-clear {
    display: none; background: none; border: none; cursor: pointer;
    color: var(--text-dim); padding: 4px; border-radius: 50%;
    line-height: 0; transition: color 0.15s; align-items: center; justify-content: center;
  }
  #search-clear:active { color: var(--text-sub); }
  #search-clear.visible { display: flex; }

  /* ── Section label ── */
  .section-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.13em;
    text-transform: uppercase;
    color: var(--text-dim);
    padding: 20px 24px 10px;
    flex-shrink: 0;
  }

  /* ── Grid scroll container ── */
  #grid-wrap {
    flex: 1;
    overflow-y: auto; overflow-x: hidden;
    overscroll-behavior: contain;
    padding: 0 16px calc(var(--safe-bottom) + 28px);
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  #grid-wrap::-webkit-scrollbar { display: none; }

  /* ── App grid ── */
  #app-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(148px, 1fr));
    gap: 10px;
  }

  /* ── Tile ── */
  .app-tile {
    position: relative;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r-tile);
    padding: 18px 16px 16px;
    display: flex; flex-direction: column;
    align-items: flex-start; gap: 14px;
    cursor: pointer; text-decoration: none;
    overflow: hidden;
    transition: border-color 0.18s, transform 0.12s;
    will-change: transform;
    animation: tileIn 0.32s cubic-bezier(0.22,1,0.36,1) both;
  }

  /* top-corner accent glow */
  .app-tile::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse 90% 60% at 20% -5%, var(--tile-accent, transparent), transparent 70%);
    opacity: 0.5;
    pointer-events: none;
  }

  /* bottom accent line */
  .app-tile::after {
    content: '';
    position: absolute;
    bottom: 0; left: 16px; right: 16px; height: 1px;
    background: var(--tile-accent, transparent);
    opacity: 0.2;
    pointer-events: none;
  }

  .app-tile:active {
    transform: scale(0.95);
    border-color: var(--border-md);
  }

  /* ── Icon ── */
  .tile-icon-wrap {
    width: 52px; height: 52px;
    border-radius: var(--r-icon);
    overflow: hidden;
    background: var(--surface2);
    border: 1px solid var(--border-md);
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.12s;
  }

  .app-tile:active .tile-icon-wrap { transform: scale(0.9); }

  .tile-icon-img {
    width: 100%; height: 100%;
    object-fit: cover; display: block;
  }

  .tile-icon-fallback {
    font-size: 22px; font-weight: 500;
    color: var(--text-sub); font-family: var(--font);
    text-transform: uppercase;
  }

  /* ── Tile text ── */
  .tile-body {
    display: flex; flex-direction: column; gap: 3px;
    width: 100%;
  }

  .tile-name {
    font-size: 14px; font-weight: 500;
    color: var(--text); letter-spacing: -0.015em;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  .tile-desc {
    font-size: 11.5px; color: var(--text-dim);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    line-height: 1.4;
  }

  /* ── States ── */
  .state-placeholder {
    grid-column: 1 / -1;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 10px; padding: 64px 24px;
    color: var(--text-dim); font-size: 14px; text-align: center;
  }

  .loader { display: flex; gap: 7px; }
  .loader-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--text-dim);
    animation: dotPulse 1.3s ease-in-out infinite;
  }
  .loader-dot:nth-child(2) { animation-delay: 0.18s; }
  .loader-dot:nth-child(3) { animation-delay: 0.36s; }

  @keyframes dotPulse {
    0%, 80%, 100% { opacity: 0.25; transform: scale(0.8); }
    40%           { opacity: 1;    transform: scale(1); }
  }

  @keyframes tileIn {
    from { opacity: 0; transform: translateY(10px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
</style>
</head>

 
<body>
<div id="app">

  <header>
    <div class="header-eyebrow">Personal workspace</div>
    <h1>Amar's Play<em>ground</em></h1>
  </header>

  <div class="search-wrap">
    <div class="search-box">
      <span class="search-icon">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2.2"
          stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
      </span>
      <input id="search" type="search" placeholder="Search apps…"
        autocomplete="off" spellcheck="false" inputmode="search">
      <button id="search-clear" aria-label="Clear">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2.5"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 6 6 18M6 6l12 12"/>
        </svg>
      </button>
    </div>
  </div>

  <div class="section-label" id="section-label">All apps</div>

  <div id="grid-wrap">
    <div id="app-grid">
      <div class="state-placeholder">
        <div class="loader">
          <div class="loader-dot"></div>
          <div class="loader-dot"></div>
          <div class="loader-dot"></div>
        </div>
        <span>Loading…</span>
      </div>
    </div>
  </div>

</div>
<script> 
  const grid       = document.getElementById('app-grid');
  const searchEl   = document.getElementById('search');
  const clearBtn   = document.getElementById('search-clear');
  const sectionLbl = document.getElementById('section-label');
  let allApps = [];

  function hexToRgba(hex, a) {
    if (!hex || hex.length < 7) return `rgba(108,92,231,${a})`;
    return `rgba(${parseInt(hex.slice(1,3),16)},${parseInt(hex.slice(3,5),16)},${parseInt(hex.slice(5,7),16)},${a})`;
  }

  function esc(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  async function load() {
    let list;
    try {
      const r = await fetch('./apps.json');
      if (!r.ok) throw 0;
      list = await r.json();
    } catch {
      grid.innerHTML = '<div class="state-placeholder">Could not load apps.json</div>';
      return;
    }

    allApps = await Promise.all(list.map(async folder => {
      try {
        const r = await fetch(`./${folder}/app.json`);
        const meta = r.ok ? await r.json() : {};
        return { folder, ...meta };
      } catch { return { folder }; }
    }));

    render(allApps);
  }

  function render(apps) {
    grid.innerHTML = '';
    if (!apps.length) {
      grid.innerHTML = '<div class="state-placeholder">No apps found</div>';
      return;
    }

    apps.forEach((app, i) => {
      const tile = document.createElement('a');
      tile.className = 'app-tile';
      tile.href = `./${app.folder}/`;
      tile.style.animationDelay = `${i * 35}ms`;
      tile.style.setProperty('--tile-accent', hexToRgba(app.color || '#6c5ce7', 0.3));

      /* Icon: image file or first-letter fallback */
      const fallbackLetter = esc((app.name || app.folder).charAt(0));
      let iconHtml;
      if (app.icon) {
        iconHtml = `
          <div class="tile-icon-wrap">
            <img class="tile-icon-img"
              src="${esc('./' + app.folder + '/' + app.icon)}"
              alt=""
              onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
            <span class="tile-icon-fallback" style="display:none">${fallbackLetter}</span>
          </div>`;
      } else {
        iconHtml = `
          <div class="tile-icon-wrap">
            <span class="tile-icon-fallback">${fallbackLetter}</span>
          </div>`;
      }

      tile.innerHTML = `${iconHtml}
        <div class="tile-body">
          <div class="tile-name">${esc(app.name || app.folder)}</div>
          ${app.description ? `<div class="tile-desc">${esc(app.description)}</div>` : ''}
        </div>`;

      grid.appendChild(tile);
    });
  }

  searchEl.addEventListener('input', () => {
    const q = searchEl.value.trim().toLowerCase();
    clearBtn.classList.toggle('visible', q.length > 0);
    if (!q) { sectionLbl.textContent = 'All apps'; render(allApps); return; }
    const f = allApps.filter(a =>
      (a.name||a.folder).toLowerCase().includes(q) ||
      (a.description||'').toLowerCase().includes(q));
    sectionLbl.textContent = `${f.length} result${f.length !== 1 ? 's' : ''}`;
    render(f);
  });

  clearBtn.addEventListener('click', () => {
    searchEl.value = '';
    clearBtn.classList.remove('visible');
    sectionLbl.textContent = 'All apps';
    render(allApps);
  });

  load();
</script>

<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/Amars-Playground/sw.js');
  }
</script>
</body>
</html>
